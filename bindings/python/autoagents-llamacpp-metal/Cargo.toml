[package]
name = "autoagents-llamacpp-metal-py"
version.workspace = true
edition.workspace = true
description = "Python bindings for AutoAgents llama.cpp Metal backend"
license.workspace = true
publish = false

[lib]
name = "_autoagents_llamacpp_metal"
crate-type = ["cdylib"]
# Python bindings are tested through maturin/pytest. Cargo's Rust lib test
# harness embeds Python and requires a system libpython at runtime.
test = false
doctest = false

[features]
default = []
extension-module = ["pyo3/extension-module"]
metal = ["autoagents-llamacpp-py-core/metal"]

[dependencies]
autoagents-llamacpp-py-core = { path = "../autoagents-llamacpp-core" }
pyo3 = { version = "0.29.0", features = ["abi3-py39"] }
