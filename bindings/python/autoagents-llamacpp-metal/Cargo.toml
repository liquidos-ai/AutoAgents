[package]
name = "autoagents-llamacpp-metal-py"
version.workspace = true
edition.workspace = true
description = "Python bindings for AutoAgents llama.cpp Metal backend"
license.workspace = true
publish = false

[lib]
name = "_autoagents_llamacpp_metal"
crate-type = ["cdylib"]

[features]
default = []
cuda = ["autoagents-llamacpp-py-core/cuda"]
cuda-no-vmm = ["autoagents-llamacpp-py-core/cuda-no-vmm"]
metal = ["autoagents-llamacpp-py-core/metal"]
vulkan = ["autoagents-llamacpp-py-core/vulkan"]

[dependencies]
autoagents-llamacpp-py-core = { path = "../autoagents-llamacpp-core" }
pyo3 = { version = "0.28.2", features = ["extension-module", "abi3-py39"] }
