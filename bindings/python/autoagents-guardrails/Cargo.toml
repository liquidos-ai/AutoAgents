[package]
name = "autoagents-guardrails-py"
version.workspace = true
edition.workspace = true
description = "Python bindings for AutoAgents guardrails"
license.workspace = true
publish = false

[lib]
name = "_autoagents_guardrails"
crate-type = ["cdylib", "rlib"]
# Python bindings are tested through maturin/pytest. Cargo's Rust lib test
# harness embeds Python and requires a system libpython at runtime.
test = false
doctest = false

[features]
default = []
extension-module = ["pyo3/extension-module"]

[dependencies]
autoagents-py = { path = "../autoagents", default-features = false }
autoagents-guardrails = { workspace = true }
autoagents-llm = { workspace = true }
pyo3 = { version = "0.28.2", features = ["abi3-py39"] }
