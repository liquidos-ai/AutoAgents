[build-system]
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[project]
name = "autoagents-guardrails-py"
dynamic = ["version"]
requires-python = ">=3.9"
description = "Guardrails Python bindings for AutoAgents"
license = { text = "MIT OR Apache-2.0" }
dependencies = ["autoagents-py==0.3.6"]

[tool.maturin]
module-name = "autoagents_guardrails._autoagents_guardrails"
python-source = "."
compatibility = "manylinux_2_28"
