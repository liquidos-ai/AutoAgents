[build-system]
requires = ["maturin>=1.13.3,<2"]
build-backend = "maturin"

[project]
name = "autoagents-py"
dynamic = ["version"]
requires-python = ">=3.9"
description = "Official Python bindings for the AutoAgents multi-agent framework"
readme = "README.md"
license = { text = "MIT OR Apache-2.0" }
dependencies = []
authors = [{ name = "Sai Vishwak Korimerla", email = "vishwak@liquidos.ai" }]
maintainers = [
    { name = "Sai Vishwak Korimerla", email = "vishwak@liquidos.ai" },
]
classifiers = [
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Rust",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]

[project.urls]
Documentation = "https://liquidos-ai.github.io/AutoAgents/"
Repository = "https://github.com/liquidos-ai/AutoAgents"
Issues = "https://github.com/liquidos-ai/AutoAgents/issues"
Releases = "https://github.com/liquidos-ai/AutoAgents/releases"

[project.optional-dependencies]
guardrails = ["autoagents-guardrails-py==0.4.0"]
llamacpp = ["autoagents-llamacpp-py==0.4.0"]
llamacpp-metal = ["autoagents-llamacpp-metal==0.4.0"]
llamacpp-cuda = ["autoagents-llamacpp-cuda==0.4.0"]
llamacpp-vulkan = ["autoagents-llamacpp-vulkan==0.4.0"]
mistralrs = ["autoagents-mistral-rs-py==0.4.0"]
mistralrs-metal = ["autoagents-mistral-rs-metal==0.4.0"]
mistralrs-cuda = ["autoagents-mistral-rs-cuda==0.4.0"]

[tool.maturin]
module-name = "autoagents_py._autoagents_py"
compatibility = "manylinux_2_28"
features = ["extension-module"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
