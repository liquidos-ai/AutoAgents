[build-system]
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[project]
name = "autoagents-py"
dynamic = ["version"]
requires-python = ">=3.9"
description = "Python bindings for the AutoAgents Rust multi-agent framework"
license = { text = "MIT OR Apache-2.0" }
dependencies = []

[tool.maturin]
module-name = "autoagents_py"
compatibility = "manylinux_2_28"

[tool.pytest.ini_options]
asyncio_mode = "auto"
