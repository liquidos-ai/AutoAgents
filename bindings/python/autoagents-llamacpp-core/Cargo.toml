[package]
name = "autoagents-llamacpp-py-core"
version.workspace = true
edition.workspace = true
description = "Shared Python binding implementation for AutoAgents llama.cpp packages"
license.workspace = true
publish = false

[lib]
name = "autoagents_llamacpp_py_core"
# Python bindings are tested through maturin/pytest. Cargo's Rust lib test
# harness embeds Python and requires a system libpython at runtime.
test = false
doctest = false

[features]
default = []
cuda = ["autoagents-llamacpp/cuda"]
cuda-no-vmm = ["autoagents-llamacpp/cuda-no-vmm"]
metal = ["autoagents-llamacpp/metal"]
vulkan = ["autoagents-llamacpp/vulkan"]

[dependencies]
autoagents-py = { path = "../autoagents", default-features = false }
autoagents-llm = { workspace = true }
autoagents-llamacpp = { workspace = true, features = ["mtmd"] }
pyo3 = { version = "0.28.2", features = ["abi3-py39"] }
pyo3-async-runtimes = { version = "0.28", features = ["tokio-runtime"] }
serde_json = { workspace = true }
