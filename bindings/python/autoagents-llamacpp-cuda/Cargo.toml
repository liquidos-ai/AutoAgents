[package]
name = "autoagents-llamacpp-cuda-py"
version.workspace = true
edition.workspace = true
description = "Python bindings for AutoAgents llama.cpp CUDA backend"
license.workspace = true
publish = false

[lib]
name = "_autoagents_llamacpp_cuda"
crate-type = ["cdylib"]

[features]
default = []
extension-module = ["pyo3/extension-module"]
cuda = ["autoagents-llamacpp-py-core/cuda"]
cuda-no-vmm = ["autoagents-llamacpp-py-core/cuda-no-vmm"]

[dependencies]
autoagents-llamacpp-py-core = { path = "../autoagents-llamacpp-core" }
pyo3 = { version = "0.28.2", features = ["abi3-py39"] }
