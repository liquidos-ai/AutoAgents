[package]
name = "autoagents-mistral-rs-py"
version.workspace = true
edition.workspace = true
description = "Python bindings for AutoAgents mistral-rs backend"
license.workspace = true
publish = false

[lib]
name = "_autoagents_mistral_rs"
crate-type = ["cdylib"]

[features]
default = []

[dependencies]
autoagents-mistral-rs-py-core = { path = "../autoagents-mistralrs-core" }
pyo3 = { version = "0.28.2", features = ["extension-module", "abi3-py39"] }
