[package]
name = "autoagents-mistral-rs-metal-py"
version.workspace = true
edition.workspace = true
description = "Python bindings for AutoAgents mistral-rs Metal backend"
license.workspace = true
publish = false

[lib]
name = "_autoagents_mistral_rs_metal"
crate-type = ["cdylib"]

[features]
default = []
extension-module = ["pyo3/extension-module"]
metal = ["autoagents-mistral-rs-py-core/metal"]

[dependencies]
autoagents-mistral-rs-py-core = { path = "../autoagents-mistralrs-core" }
pyo3 = { version = "0.28.2", features = ["abi3-py39"] }
