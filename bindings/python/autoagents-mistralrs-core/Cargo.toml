[package]
name = "autoagents-mistral-rs-py-core"
version.workspace = true
edition.workspace = true
description = "Shared Python binding implementation for AutoAgents mistral-rs packages"
license.workspace = true
publish = false

[lib]
name = "autoagents_mistral_rs_py_core"
# Python bindings are tested through maturin/pytest. Cargo's Rust lib test
# harness embeds Python and requires a system libpython at runtime.
test = false
doctest = false

[features]
default = []
cuda = ["autoagents-mistral-rs/cuda"]
cudnn = ["autoagents-mistral-rs/cudnn"]
metal = ["autoagents-mistral-rs/metal"]
flash-attn = ["autoagents-mistral-rs/flash-attn"]
accelerate = ["autoagents-mistral-rs/accelerate"]
mkl = ["autoagents-mistral-rs/mkl"]
nccl = ["autoagents-mistral-rs/nccl"]
ring = ["autoagents-mistral-rs/ring"]

[dependencies]
autoagents-py = { path = "../autoagents", default-features = false }
autoagents-llm = { workspace = true }
autoagents-mistral-rs = { workspace = true }
pyo3 = { version = "0.29.0", features = ["abi3-py39"] }
pyo3-async-runtimes = { version = "0.29.0", features = ["tokio-runtime"] }
serde_json = { workspace = true }
