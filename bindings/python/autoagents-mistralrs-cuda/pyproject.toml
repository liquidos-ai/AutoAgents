[build-system]
requires = ["maturin>=1.5,<2.0"]
build-backend = "maturin"

[project]
name = "autoagents-mistral-rs-cuda"
dynamic = ["version"]
requires-python = ">=3.9"
description = "Official Python bindings for AutoAgents mistral-rs backend (CUDA)"
readme = "README.md"
license = { text = "MIT OR Apache-2.0" }
dependencies = ["autoagents-py==0.3.6"]

[tool.maturin]
module-name = "autoagents_mistral_rs_cuda._autoagents_mistral_rs_cuda"
features = ["cuda"]
python-source = "."
