[package]
name = "autoagents-mistral-rs-cuda-py"
version.workspace = true
edition.workspace = true
description = "Python bindings for AutoAgents mistral-rs CUDA backend"
license.workspace = true
publish = false

[lib]
name = "_autoagents_mistral_rs_cuda"
crate-type = ["cdylib"]
# Python bindings are tested through maturin/pytest. Cargo's Rust lib test
# harness embeds Python and requires a system libpython at runtime.
test = false
doctest = false

[features]
default = []
extension-module = ["pyo3/extension-module"]
cuda = ["autoagents-mistral-rs-py-core/cuda"]
cudnn = ["autoagents-mistral-rs-py-core/cudnn"]

[dependencies]
autoagents-mistral-rs-py-core = { path = "../autoagents-mistralrs-core" }
pyo3 = { version = "0.29.0", features = ["abi3-py39"] }
