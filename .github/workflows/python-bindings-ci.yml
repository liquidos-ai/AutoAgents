name: Python Bindings CI

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Build strategy ────────────────────────────────────────────────────────────
# Match the release publishing build matrix so packaging issues are caught in
# PR validation before a release tag is pushed.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Linux x86_64 (CPU + Vulkan) ──────────────────────────────────────────
  build-linux-x86_64:
    name: Linux x86_64
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'feature/v')
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Prepare wheel output directories
        run: |
          mkdir -p dist/autoagents
          mkdir -p dist/autoagents-guardrails
          mkdir -p dist/llamacpp-cpu
          mkdir -p dist/llamacpp-vulkan
          mkdir -p dist/mistralrs-cpu

      - name: Install llama.cpp Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev llvm-dev libvulkan-dev glslc

      - name: Build autoagents-py
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/autoagents
            --manifest-path bindings/python/autoagents/Cargo.toml

      - name: Build autoagents-guardrails-py
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/autoagents-guardrails
            --manifest-path bindings/python/autoagents-guardrails/Cargo.toml

      - name: Build autoagents-llamacpp-py (CPU)
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/llamacpp-cpu-linux-x86_64
        with:
          target: x86_64
          manylinux: "2_28"
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y clang llvm-devel libclang libclang-devel || dnf install -y clang llvm-devel clang-libs
            elif command -v yum >/dev/null 2>&1; then
              yum install -y clang llvm-devel libclang libclang-devel || yum install -y clang llvm-devel clang-libs
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update
              apt-get install -y clang libclang-dev llvm-dev
            else
              echo "No supported package manager found to install clang/libclang"
              exit 1
            fi
          sccache: true
          args: >-
            --release
            --out dist/llamacpp-cpu
            --manifest-path bindings/python/autoagents-llamacpp/Cargo.toml

      - name: Build autoagents-llamacpp-vulkan
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/llamacpp-vulkan-linux-x86_64
        with:
          target: x86_64
          manylinux: "off"
          sccache: true
          args: >-
            --release
            --features vulkan
            --out dist/llamacpp-vulkan
            --manifest-path bindings/python/autoagents-llamacpp-vulkan/Cargo.toml

      - name: Build autoagents-mistral-rs-py (CPU)
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/mistralrs-cpu-linux-x86_64
        with:
          target: x86_64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/mistralrs-cpu
            --manifest-path bindings/python/autoagents-mistralrs/Cargo.toml

  # ── Linux aarch64 (CPU only — Vulkan/CUDA not cross-compiled) ────────────
  build-linux-aarch64:
    name: Linux aarch64
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'feature/v')
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Prepare wheel output directories
        run: |
          mkdir -p dist/autoagents
          mkdir -p dist/autoagents-guardrails
          mkdir -p dist/llamacpp-cpu
          mkdir -p dist/mistralrs-cpu

      - name: Install llama.cpp Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang libclang-dev llvm-dev

      - name: Build autoagents-py
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/autoagents
            --manifest-path bindings/python/autoagents/Cargo.toml

      - name: Build autoagents-guardrails-py
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/autoagents-guardrails
            --manifest-path bindings/python/autoagents-guardrails/Cargo.toml

      - name: Build autoagents-llamacpp-py (CPU)
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/llamacpp-cpu-linux-aarch64
        with:
          target: aarch64
          manylinux: "2_28"
          before-script-linux: |
            if command -v dnf >/dev/null 2>&1; then
              dnf install -y clang llvm-devel libclang libclang-devel || dnf install -y clang llvm-devel clang-libs
            elif command -v yum >/dev/null 2>&1; then
              yum install -y clang llvm-devel libclang libclang-devel || yum install -y clang llvm-devel clang-libs
            elif command -v apt-get >/dev/null 2>&1; then
              apt-get update
              apt-get install -y clang libclang-dev llvm-dev
            else
              echo "No supported package manager found to install clang/libclang"
              exit 1
            fi
          sccache: true
          args: >-
            --release
            --out dist/llamacpp-cpu
            --manifest-path bindings/python/autoagents-llamacpp/Cargo.toml

      - name: Build autoagents-mistral-rs-py (CPU)
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/mistralrs-cpu-linux-aarch64
        with:
          target: aarch64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/mistralrs-cpu
            --manifest-path bindings/python/autoagents-mistralrs/Cargo.toml

  # ── Linux CUDA (x86_64, non-manylinux — CUDA users have controlled envs) ─
  build-linux-cuda:
    name: Linux CUDA
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'feature/v')
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Prepare wheel output directories
        run: |
          mkdir -p dist/llamacpp-cuda
          mkdir -p dist/mistralrs-cuda

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.6.0"
          method: network

      - name: Build autoagents-llamacpp-cuda
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/llamacpp-cuda-linux-x86_64
          LLAMA_BUILD_SHARED_LIBS: "1"
        with:
          target: x86_64
          manylinux: "off"
          sccache: true
          args: >-
            --release
            --features cuda
            --out dist/llamacpp-cuda
            --manifest-path bindings/python/autoagents-llamacpp-cuda/Cargo.toml

      - name: Build autoagents-mistral-rs-cuda
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/mistralrs-cuda-linux-x86_64
          CUDA_COMPUTE_CAP: "80"
        with:
          target: x86_64
          manylinux: "off"
          sccache: true
          args: >-
            --release
            --features cuda
            --out dist/mistralrs-cuda
            --manifest-path bindings/python/autoagents-mistralrs-cuda/Cargo.toml

  # ── macOS (CPU + Metal, Intel x86_64 and Apple Silicon arm64) ────────────
  build-macos:
    name: macOS ${{ matrix.runner }}
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'feature/v')
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build autoagents-py
        run: |
          maturin build --release \
            --out dist/autoagents \
            --manifest-path bindings/python/autoagents/Cargo.toml

      - name: Build autoagents-guardrails-py
        run: |
          maturin build --release \
            --out dist/autoagents-guardrails \
            --manifest-path bindings/python/autoagents-guardrails/Cargo.toml

      - name: Build autoagents-llamacpp-py (CPU)
        env:
          CARGO_TARGET_DIR: target/python/llamacpp-cpu-macos
        run: |
          maturin build --release \
            --out dist/llamacpp-cpu \
            --manifest-path bindings/python/autoagents-llamacpp/Cargo.toml

      - name: Build autoagents-llamacpp-metal
        env:
          CARGO_TARGET_DIR: target/python/llamacpp-metal-macos
        run: |
          maturin build --release \
            --features metal \
            --out dist/llamacpp-metal \
            --manifest-path bindings/python/autoagents-llamacpp-metal/Cargo.toml

      - name: Build autoagents-mistral-rs-py (CPU)
        env:
          CARGO_TARGET_DIR: target/python/mistralrs-cpu-macos
        run: |
          maturin build --release \
            --out dist/mistralrs-cpu \
            --manifest-path bindings/python/autoagents-mistralrs/Cargo.toml

      - name: Build autoagents-mistral-rs-metal
        env:
          CARGO_TARGET_DIR: target/python/mistralrs-metal-macos
        run: |
          maturin build --release \
            --features metal \
            --out dist/mistralrs-metal \
            --manifest-path bindings/python/autoagents-mistralrs-metal/Cargo.toml

  # ── Windows x86_64 (CPU + CUDA + Vulkan) ─────────────────────────────────
  build-windows:
    name: Windows x86_64
    if: false # Temporarily disabled: Windows bindings build is too slow for CI.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.19
        with:
          cuda: "12.6.0"
          method: network

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan-sdk.exe
          Start-Process -FilePath vulkan-sdk.exe `
            -ArgumentList "--accept-licenses --default-answer --confirm-command install" `
            -Wait -NoNewWindow
          $vulkanRoot = Get-ChildItem -Path "C:\VulkanSDK" -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $vulkanRoot) {
            throw "Vulkan SDK installation succeeded but no SDK folder was found under C:\VulkanSDK"
          }
          "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($vulkanRoot.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build autoagents-py
        shell: pwsh
        run: |
          maturin build --release `
            --out dist/autoagents `
            --manifest-path bindings/python/autoagents/Cargo.toml

      - name: Build autoagents-guardrails-py
        shell: pwsh
        run: |
          maturin build --release `
            --out dist/autoagents-guardrails `
            --manifest-path bindings/python/autoagents-guardrails/Cargo.toml

      - name: Build autoagents-llamacpp-py (CPU)
        shell: pwsh
        env:
          CARGO_TARGET_DIR: target/python/llamacpp-cpu-windows
        run: |
          maturin build --release `
            --out dist/llamacpp-cpu `
            --manifest-path bindings/python/autoagents-llamacpp/Cargo.toml

      - name: Build autoagents-llamacpp-cuda
        shell: pwsh
        env:
          CARGO_TARGET_DIR: target/python/llamacpp-cuda-windows
        run: |
          maturin build --release `
            --features cuda `
            --out dist/llamacpp-cuda `
            --manifest-path bindings/python/autoagents-llamacpp-cuda/Cargo.toml

      - name: Build autoagents-llamacpp-vulkan
        shell: pwsh
        env:
          CARGO_TARGET_DIR: target/python/llamacpp-vulkan-windows
        run: |
          maturin build --release `
            --features vulkan `
            --out dist/llamacpp-vulkan `
            --manifest-path bindings/python/autoagents-llamacpp-vulkan/Cargo.toml

      - name: Build autoagents-mistral-rs-py (CPU)
        shell: pwsh
        env:
          CARGO_TARGET_DIR: target/python/mistralrs-cpu-windows
        run: |
          maturin build --release `
            --out dist/mistralrs-cpu `
            --manifest-path bindings/python/autoagents-mistralrs/Cargo.toml

      - name: Build autoagents-mistral-rs-cuda
        shell: pwsh
        env:
          CARGO_TARGET_DIR: target/python/mistralrs-cuda-windows
          CUDA_COMPUTE_CAP: "80"
        run: |
          maturin build --release `
            --features cuda `
            --out dist/mistralrs-cuda `
            --manifest-path bindings/python/autoagents-mistralrs-cuda/Cargo.toml
