name: Python Bindings

on:
  push:
    tags:
      - "v*"
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── Build strategy ────────────────────────────────────────────────────────────
# pyproject.toml in each binding directory IS the CPU build — pip install -e .
# and maturin develop work out of the box for contributors.
#
# Non-CPU variants (cuda, metal, vulkan) are separate package directories with
# their own checked-in metadata so local builds and release builds use the same
# package identity.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ── Linux x86_64 (wheel packages only) ───────────────────────────────────
  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Prepare wheel output directories
        run: |
          mkdir -p dist/autoagents
          mkdir -p dist/autoagents-guardrails
          mkdir -p dist/mistralrs-cpu

      - name: Install llama.cpp Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev llvm-dev libvulkan-dev glslc

      # ── base package ────────────────────────────────────────────────────
      - name: Build autoagents-py
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/autoagents
            --manifest-path bindings/python/autoagents/Cargo.toml

      - name: Build autoagents-guardrails-py
        uses: PyO3/maturin-action@v1
        with:
          target: x86_64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/autoagents-guardrails
            --manifest-path bindings/python/autoagents-guardrails/Cargo.toml

      # ── mistralrs CPU ───────────────────────────────────────────────────
      - name: Build autoagents-mistral-rs-py (CPU)
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/mistralrs-cpu-linux-x86_64
        with:
          target: x86_64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/mistralrs-cpu
            --manifest-path bindings/python/autoagents-mistralrs/Cargo.toml

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-py-linux-x86_64
          path: dist/autoagents/*.whl

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-guardrails-py-linux-x86_64
          path: dist/autoagents-guardrails/*.whl

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-mistral-rs-py-linux-x86_64
          path: dist/mistralrs-cpu/*.whl

  # ── Linux aarch64 (CPU only — Vulkan/CUDA not cross-compiled) ────────────
  build-linux-aarch64:
    name: Linux aarch64
    runs-on: ubuntu-24.04-arm

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Prepare wheel output directories
        run: |
          mkdir -p dist/autoagents
          mkdir -p dist/autoagents-guardrails
          mkdir -p dist/mistralrs-cpu

      - name: Install llama.cpp Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libclang-dev llvm-dev

      - name: Build autoagents-py
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/autoagents
            --manifest-path bindings/python/autoagents/Cargo.toml

      - name: Build autoagents-guardrails-py
        uses: PyO3/maturin-action@v1
        with:
          target: aarch64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/autoagents-guardrails
            --manifest-path bindings/python/autoagents-guardrails/Cargo.toml

      - name: Build autoagents-mistral-rs-py (CPU)
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/mistralrs-cpu-linux-aarch64
        with:
          target: aarch64
          manylinux: "2_28"
          sccache: true
          args: >-
            --release
            --out dist/mistralrs-cpu
            --manifest-path bindings/python/autoagents-mistralrs/Cargo.toml

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-py-linux-aarch64
          path: dist/autoagents/*.whl

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-guardrails-py-linux-aarch64
          path: dist/autoagents-guardrails/*.whl

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-mistral-rs-py-linux-aarch64
          path: dist/mistralrs-cpu/*.whl

  # ── Build source distributions for llama.cpp/cuda/vulkan variants ────────
  build-sdists:
    name: Build variant sdists
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      - name: Build autoagents-llamacpp-py sdist
        run: |
          mkdir -p dist/sdists/llamacpp
          maturin sdist \
            --manifest-path bindings/python/autoagents-llamacpp/Cargo.toml \
            --out dist/sdists/llamacpp

      - name: Build autoagents-llamacpp-cuda sdist
        run: |
          mkdir -p dist/sdists/llamacpp-cuda
          maturin sdist \
            --manifest-path bindings/python/autoagents-llamacpp-cuda/Cargo.toml \
            --out dist/sdists/llamacpp-cuda

      - name: Build autoagents-llamacpp-vulkan sdist
        run: |
          mkdir -p dist/sdists/llamacpp-vulkan
          maturin sdist \
            --manifest-path bindings/python/autoagents-llamacpp-vulkan/Cargo.toml \
            --out dist/sdists/llamacpp-vulkan

      - name: Build autoagents-mistral-rs-cuda sdist
        run: |
          mkdir -p dist/sdists/mistralrs-cuda
          maturin sdist \
            --manifest-path bindings/python/autoagents-mistralrs-cuda/Cargo.toml \
            --out dist/sdists/mistralrs-cuda

      - uses: actions/upload-artifact@v6
        with:
          name: sdist-autoagents-llamacpp-py
          path: dist/sdists/llamacpp/*.tar.gz

      - uses: actions/upload-artifact@v6
        with:
          name: sdist-autoagents-llamacpp-cuda
          path: dist/sdists/llamacpp-cuda/*.tar.gz

      - uses: actions/upload-artifact@v6
        with:
          name: sdist-autoagents-llamacpp-vulkan
          path: dist/sdists/llamacpp-vulkan/*.tar.gz

      - uses: actions/upload-artifact@v6
        with:
          name: sdist-autoagents-mistral-rs-cuda
          path: dist/sdists/mistralrs-cuda/*.tar.gz

  # ── Linux CUDA (x86_64, non-manylinux — CUDA users have controlled envs) ─
  build-linux-cuda:
    name: Linux CUDA
    if: false
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v5

      - name: Set up Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Prepare wheel output directories
        run: |
          mkdir -p dist/llamacpp-cuda
          mkdir -p dist/mistralrs-cuda

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.29
        with:
          cuda: "12.6.0"
          method: network

      # manylinux: off → wheel tagged linux_x86_64 (honest for CUDA users)
      - name: Build autoagents-llamacpp-cuda
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/llamacpp-cuda-linux-x86_64
          LLAMA_BUILD_SHARED_LIBS: "1"
        with:
          target: x86_64
          manylinux: "off"
          sccache: true
          args: >-
            --release
            --features cuda
            --out dist/llamacpp-cuda
            --manifest-path bindings/python/autoagents-llamacpp-cuda/Cargo.toml

      - name: Build autoagents-mistral-rs-cuda
        uses: PyO3/maturin-action@v1
        env:
          CARGO_TARGET_DIR: ${{ runner.temp }}/cargo-target/mistralrs-cuda-linux-x86_64
          CUDA_COMPUTE_CAP: "80"
        with:
          target: x86_64
          manylinux: "off"
          sccache: true
          args: >-
            --release
            --features cuda
            --out dist/mistralrs-cuda
            --manifest-path bindings/python/autoagents-mistralrs-cuda/Cargo.toml

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-llamacpp-cuda-linux-x86_64
          path: dist/llamacpp-cuda/*.whl

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-mistral-rs-cuda-linux-x86_64
          path: dist/mistralrs-cuda/*.whl

  # ── macOS (CPU + Metal, Intel x86_64 and Apple Silicon arm64) ────────────
  build-macos:
    name: macOS ${{ matrix.runner }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest # Apple Silicon arm64

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      # ── base package ────────────────────────────────────────────────────
      - name: Build autoagents-py
        run: |
          maturin build --release \
            --out dist/autoagents \
            --manifest-path bindings/python/autoagents/Cargo.toml

      - name: Build autoagents-guardrails-py
        run: |
          maturin build --release \
            --out dist/autoagents-guardrails \
            --manifest-path bindings/python/autoagents-guardrails/Cargo.toml

      # ── llamacpp Metal (Xcode ships Metal SDK — no extra setup) ─────────
      - name: Build autoagents-llamacpp-metal
        env:
          CARGO_TARGET_DIR: target/python/llamacpp-metal-macos
        run: |
          maturin build --release \
            --features metal \
            --out dist/llamacpp-metal \
            --manifest-path bindings/python/autoagents-llamacpp-metal/Cargo.toml

      # ── mistralrs CPU ───────────────────────────────────────────────────
      - name: Build autoagents-mistral-rs-py (CPU)
        env:
          CARGO_TARGET_DIR: target/python/mistralrs-cpu-macos
        run: |
          maturin build --release \
            --out dist/mistralrs-cpu \
            --manifest-path bindings/python/autoagents-mistralrs/Cargo.toml

      # ── mistralrs Metal ─────────────────────────────────────────────────
      - name: Build autoagents-mistral-rs-metal
        env:
          CARGO_TARGET_DIR: target/python/mistralrs-metal-macos
        run: |
          maturin build --release \
            --features metal \
            --out dist/mistralrs-metal \
            --manifest-path bindings/python/autoagents-mistralrs-metal/Cargo.toml

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-py-macos-arm64
          path: dist/autoagents/*.whl

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-guardrails-py-macos-arm64
          path: dist/autoagents-guardrails/*.whl

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-llamacpp-metal-macos-arm64
          path: dist/llamacpp-metal/*.whl

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-mistral-rs-py-macos-arm64
          path: dist/mistralrs-cpu/*.whl

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-autoagents-mistral-rs-metal-macos-arm64
          path: dist/mistralrs-metal/*.whl

  # ── Windows x86_64 (CPU + CUDA + Vulkan) ─────────────────────────────────
  build-windows:
    name: Windows x86_64
    if: false # Temporarily disabled: Windows bindings build is too slow.
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Rust stable
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.29
        with:
          cuda: "12.6.0"
          method: network

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $url = "https://sdk.lunarg.com/sdk/download/latest/windows/vulkan-sdk.exe"
          Invoke-WebRequest -Uri $url -OutFile vulkan-sdk.exe
          Start-Process -FilePath vulkan-sdk.exe `
            -ArgumentList "--accept-licenses --default-answer --confirm-command install" `
            -Wait -NoNewWindow
          $vulkanRoot = Get-ChildItem -Path "C:\VulkanSDK" -Directory |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if (-not $vulkanRoot) {
            throw "Vulkan SDK installation succeeded but no SDK folder was found under C:\VulkanSDK"
          }
          "VULKAN_SDK=$($vulkanRoot.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$($vulkanRoot.FullName)\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install maturin
        run: python -m pip install --upgrade pip maturin

      # ── base package ────────────────────────────────────────────────────
      - name: Build autoagents-py
        shell: pwsh
        run: |
          maturin build --release `
            --out dist/autoagents `
            --manifest-path bindings/python/autoagents/Cargo.toml

      - name: Build autoagents-guardrails-py
        shell: pwsh
        run: |
          maturin build --release `
            --out dist/autoagents-guardrails `
            --manifest-path bindings/python/autoagents-guardrails/Cargo.toml

      # ── llamacpp CPU ────────────────────────────────────────────────────
      - name: Build autoagents-llamacpp-py (CPU)
        shell: pwsh
        env:
          CARGO_TARGET_DIR: target/python/llamacpp-cpu-windows
        run: |
          maturin build --release `
            --out dist/llamacpp-cpu `
            --manifest-path bindings/python/autoagents-llamacpp/Cargo.toml

      # ── llamacpp CUDA ───────────────────────────────────────────────────
      - name: Build autoagents-llamacpp-cuda
        shell: pwsh
        env:
          CARGO_TARGET_DIR: target/python/llamacpp-cuda-windows
        run: |
          maturin build --release `
            --features cuda `
            --out dist/llamacpp-cuda `
            --manifest-path bindings/python/autoagents-llamacpp-cuda/Cargo.toml

      # ── llamacpp Vulkan ─────────────────────────────────────────────────
      - name: Build autoagents-llamacpp-vulkan
        shell: pwsh
        env:
          CARGO_TARGET_DIR: target/python/llamacpp-vulkan-windows
        run: |
          maturin build --release `
            --features vulkan `
            --out dist/llamacpp-vulkan `
            --manifest-path bindings/python/autoagents-llamacpp-vulkan/Cargo.toml

      # ── mistralrs CPU ───────────────────────────────────────────────────
      - name: Build autoagents-mistral-rs-py (CPU)
        shell: pwsh
        env:
          CARGO_TARGET_DIR: target/python/mistralrs-cpu-windows
        run: |
          maturin build --release `
            --out dist/mistralrs-cpu `
            --manifest-path bindings/python/autoagents-mistralrs/Cargo.toml

      # ── mistralrs CUDA ──────────────────────────────────────────────────
      - name: Build autoagents-mistral-rs-cuda
        shell: pwsh
        env:
          CARGO_TARGET_DIR: target/python/mistralrs-cuda-windows
          CUDA_COMPUTE_CAP: "80"
        run: |
          maturin build --release `
            --features cuda `
            --out dist/mistralrs-cuda `
            --manifest-path bindings/python/autoagents-mistralrs-cuda/Cargo.toml

      - uses: actions/upload-artifact@v6
        with:
          name: wheels-windows
          path: dist/**/*.whl

  # ── Publish to PyPI (tag-triggered only, OIDC trusted publisher) ──────────
  publish:
    name: Publish ${{ matrix.package }} to PyPI
    needs:
      - build-linux-x86_64
      - build-linux-aarch64
      - build-macos
      - build-sdists
      # build-windows is intentionally disabled above; keeping it in `needs`
      # causes this publish job to be skipped.
    if: (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - package: autoagents-py
            environment: pypi
            artifact_pattern: wheels-autoagents-py-*
            file_glob: "*.whl"
          - package: autoagents-guardrails-py
            environment: pypi-guardrails
            artifact_pattern: wheels-autoagents-guardrails-py-*
            file_glob: "*.whl"
          - package: autoagents-llamacpp-py
            environment: pypi-llamacpp
            artifact_pattern: sdist-autoagents-llamacpp-py
            file_glob: "*.tar.gz"
          - package: autoagents-llamacpp-cuda
            environment: pypi-llamacpp-cuda
            artifact_pattern: sdist-autoagents-llamacpp-cuda
            file_glob: "*.tar.gz"
          - package: autoagents-llamacpp-vulkan
            environment: pypi-llamacpp-vulkan
            artifact_pattern: sdist-autoagents-llamacpp-vulkan
            file_glob: "*.tar.gz"
          - package: autoagents-llamacpp-metal
            environment: pypi-llamacpp-metal
            artifact_pattern: wheels-autoagents-llamacpp-metal-*
            file_glob: "*.whl"
          - package: autoagents-mistral-rs-py
            environment: pypi-mistralrs
            artifact_pattern: wheels-autoagents-mistral-rs-py-*
            file_glob: "*.whl"
          - package: autoagents-mistral-rs-cuda
            environment: pypi-mistralrs-cuda
            artifact_pattern: sdist-autoagents-mistral-rs-cuda
            file_glob: "*.tar.gz"
          - package: autoagents-mistral-rs-metal
            environment: pypi-mistralrs-metal
            artifact_pattern: wheels-autoagents-mistral-rs-metal-*
            file_glob: "*.whl"
    environment: ${{ matrix.environment }}
    permissions:
      id-token: write # required for OIDC trusted publisher — no token needed

    steps:
      - name: Download artifacts for ${{ matrix.package }}
        uses: actions/download-artifact@v7
        with:
          pattern: ${{ matrix.artifact_pattern }}
          merge-multiple: true
          path: publish/

      - name: Verify downloaded artifacts
        run: |
          count="$(find publish -type f -name '${{ matrix.file_glob }}' | wc -l | tr -d ' ')"
          echo "Downloaded ${count} package file(s) for ${{ matrix.package }}"
          if [ "$count" = "0" ]; then
            echo "No package files matching '${{ matrix.file_glob }}' were downloaded for pattern '${{ matrix.artifact_pattern }}'"
            exit 1
          fi
          find publish -type f -name '${{ matrix.file_glob }}' -print

      - name: List publish artifacts
        run: ls -lh publish/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: publish/
          skip-existing: true
          verbose: true

  upload-release-assets:
    name: Upload wheels to GitHub Release
    needs:
      - build-linux-x86_64
      - build-linux-aarch64
      - build-macos
      - build-sdists
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist/

      - name: Download sdist artifacts
        uses: actions/download-artifact@v7
        with:
          pattern: sdist-*
          merge-multiple: true
          path: dist/

      - name: Verify packages to upload
        run: |
          wheel_count="$(find dist -type f -name '*.whl' | wc -l | tr -d ' ')"
          sdist_count="$(find dist -type f -name '*.tar.gz' | wc -l | tr -d ' ')"
          count="$((wheel_count + sdist_count))"
          echo "Found ${wheel_count} wheel(s) and ${sdist_count} sdist(s)"
          if [ "$count" = "0" ]; then
            echo "No package artifacts found to upload"
            exit 1
          fi
          find dist -type f -name '*.whl' -print
          find dist -type f -name '*.tar.gz' -print

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            dist/**/*.whl
            dist/**/*.tar.gz
          fail_on_unmatched_files: true
