name: CI Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  # CI pins the maturin executable for reproducible builds; pyproject.toml only
  # declares the supported build-backend range for isolated builds.
  MATURIN_VERSION: "1.13.3"
  CARGO_INCREMENTAL: "0"

jobs:
  ci:
    name: CI
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        features:
          - full #This will test all the LLM Providers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libasound2-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview,rustfmt,clippy

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Add WASI target
        run: rustup target add wasm32-wasip1

      - name: Run fmt
        run: cargo fmt -- --check

      - name: Run clippy
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            CARGO_TARGET_DIR=target/ci-clippy cargo clippy --workspace --all-targets --no-default-features -- -D warnings
          else
            CARGO_TARGET_DIR=target/ci-clippy cargo clippy --workspace --all-targets --features "${{ matrix.features }}" -- -D warnings
          fi
          rm -rf target/ci-clippy

      - name: Run tests
        run: |
          if [ -z "${{ matrix.features }}" ]; then
            CARGO_TARGET_DIR=target/ci-test cargo test --features default --workspace \
              --exclude autoagents-mistral-rs
          else
            CARGO_TARGET_DIR=target/ci-test cargo test --workspace --features "${{ matrix.features }}" \
              --exclude autoagents-mistral-rs
          fi
          rm -rf target/ci-test

      - name: Run cargo check
        run: |
          CARGO_TARGET_DIR=target/ci-check cargo check --workspace --all-targets --no-default-features
          rm -rf target/ci-check

      - name: Run WASI compatibility checks
        run: |
          CARGO_TARGET_DIR=target/ci-wasi cargo check -p autoagents-core --target wasm32-wasip1
          CARGO_TARGET_DIR=target/ci-wasi cargo check -p autoagents-core --features codeact --target wasm32-wasip1
          CARGO_TARGET_DIR=target/ci-wasi cargo check -p autoagents-llm --target wasm32-wasip1
          rm -rf target/ci-wasi

  python_bindings_py:
    name: Python Bindings (Python Coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libasound2-dev pkg-config

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Python test dependencies
        run: .venv/bin/python -m pip install --upgrade pip "maturin==${{ env.MATURIN_VERSION }}" pytest pytest-asyncio pytest-cov

      - name: Run Python binding tests
        run: make python-bindings-test-clean

  multi_os:
    name: Multi-OS build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Build Workspace
        if: matrix.os != 'windows-latest'
        run: cargo build --workspace --release

      - name: Build supported crates (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >-
          cargo build --release
          --package autoagents
          --package autoagents-core
          --package autoagents-llm
          --package autoagents-derive
          --package autoagents-protocol
          --package autoagents-toolkit
          --package autoagents-guardrails
          --package autoagents-telemetry
          --package autoagents-qdrant
