name: CI Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: read-all

env:
  # CI pins the maturin executable for reproducible builds; pyproject.toml only
  # declares the supported build-backend range for isolated builds.
  MATURIN_VERSION: "1.13.3"
  CARGO_INCREMENTAL: "0"

jobs:
  ci:
    name: CI
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    env:
      # Reuse Cargo artifacts across clippy, tests, no-default checks, and WASI
      # checks within this matrix lane. Separate lanes still get isolated target
      # dirs so feature modes cannot contaminate each other.
      CARGO_TARGET_DIR: target/ci-${{ matrix.mode }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - mode: full
            cargo_args: --features full
          - mode: default
            cargo_args: --features default
          - mode: no-default
            cargo_args: --no-default-features

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libasound2-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview,rustfmt,clippy

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache/CodeQL
          df -h

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Add WASI target
        run: rustup target add wasm32-wasip1

      - name: Run fmt
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets ${{ matrix.cargo_args }} -- -D warnings

      - name: Run tests
        run: |
          cargo test --workspace ${{ matrix.cargo_args }} \
            --exclude autoagents-mistral-rs

      - name: Run cargo check
        if: matrix.mode == 'no-default'
        run: cargo check --workspace --all-targets --no-default-features

      - name: Run WASI compatibility checks
        run: |
          cargo check -p autoagents-core --target wasm32-wasip1
          cargo check -p autoagents-core --features codeact --target wasm32-wasip1
          cargo check -p autoagents-llm --target wasm32-wasip1

  release_validation:
    name: Release validation
    runs-on: ubuntu-latest
    env:
      # Release validation compiles docs, examples, and smoke binaries. Keeping
      # one target dir lets later commands reuse dependencies from earlier ones.
      CARGO_TARGET_DIR: target/release-validation

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libasound2-dev pkg-config

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check release metadata
        run: make release-check

      - name: Build rustdoc
        run: |
          cargo doc --no-deps --features full \
            -p autoagents \
            -p autoagents-core \
            -p autoagents-llm \
            -p autoagents-derive \
            -p autoagents-protocol \
            -p autoagents-toolkit \
            -p autoagents-guardrails \
            -p autoagents-qdrant \
            -p autoagents-speech \
            -p autoagents-telemetry

      - name: Smoke test autoagents-mistral-rs
        run: |
          cargo test -p autoagents-mistral-rs
          cargo check -p mistral_rs

      - name: Compile documented examples
        run: |
          cargo check -p basic-example
          cargo check -p coding_agent
          cargo check -p safe_local_agent
          cargo check -p mistral_rs
          cargo check -p mcp-example
          cargo check -p vector-store-in-memory
          cargo check -p vector-store-qdrant

      - name: Smoke documented CLI help
        run: |
          cargo run -p coding_agent -- --help
          cargo run -p mistral_rs -- --help

  wasi_provider_smoke:
    name: WASI provider smoke
    runs-on: ubuntu-latest
    env:
      # The smoke script builds both the mock server and WASI component; use a
      # stable target dir so those artifacts are found and reused inside the job.
      CARGO_TARGET_DIR: target/ci-wasi-provider

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-targets: false

      - name: Install WASI smoke prerequisites
        run: |
          rustup target add wasm32-wasip2
          cargo install wasm-component-ld --locked
          curl -L https://github.com/bytecodealliance/wasmtime/releases/download/v36.0.2/wasmtime-v36.0.2-x86_64-linux.tar.xz | tar -xJ
          echo "$PWD/wasmtime-v36.0.2-x86_64-linux" >> "$GITHUB_PATH"

      - name: Run WASI provider smoke
        run: crates/autoagents-llm/examples/wasm_smoke/run.sh

  python_bindings_py:
    name: Python Bindings (Python Coverage)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake libasound2-dev pkg-config

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Create virtualenv
        run: python -m venv .venv

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Python test dependencies
        run: .venv/bin/python -m pip install --upgrade pip "maturin==${{ env.MATURIN_VERSION }}" pytest pytest-asyncio pytest-cov

      - name: Run Python binding tests
        run: make python-bindings-test-clean

  multi_os:
    name: Multi-OS build
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libasound2-dev

      - name: Build Workspace
        if: matrix.os != 'windows-latest'
        run: cargo build --workspace --release

      - name: Build supported crates (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: >-
          cargo build --release
          --package autoagents
          --package autoagents-core
          --package autoagents-llm
          --package autoagents-derive
          --package autoagents-protocol
          --package autoagents-toolkit
          --package autoagents-guardrails
          --package autoagents-telemetry
          --package autoagents-qdrant
