pre-commit:
  parallel: true
  commands:
    fmt:
      run: cargo fmt --all -- --check
      stage_fixed: true

    clippy:
      run: cargo clippy --workspace --all-targets --features full -- -D warnings

    test:
      run: cargo test --workspace --features full --exclude autoagents-mistral-rs

    check:
      run: cargo check --workspace --all-targets --no-default-features

    release-check:
      run: make release-check

    python-bindings:
      glob: "{bindings/python/**,Makefile,scripts/release/**,.github/workflows/*.yml,lefthook.yml}"
      run: make python-bindings-test

